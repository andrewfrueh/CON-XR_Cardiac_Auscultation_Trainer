<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Heart Visualization</title>

    <!-- External Stylesheets -->
    <link rel="stylesheet" href="assets/styles/main.css" />
    <link rel="stylesheet" href="assets/styles/controls.css" />

    <link rel="icon" type="image/png" href="/assets/favicon.png" />
  </head>
  <body>
    <div id="app-layout">
      <div id="container">
        <div id="loading">
          <div class="loading-spinner"></div>
          Loading Realistic Heart Model...
        </div>
      </div>

      <div class="controls" id="heartControls">
        <!-- Play button that shows when controls are collapsed (mobile only) -->
        <button class="control-btn icon-btn play-btn-collapsed" id="playPauseBtnCollapsed" onclick="toggleAnimation()" aria-label="Play/Pause" title="Pause">
          <span class="icon">⏸</span>
        </button>

        <button class="control-btn toggle-btn" onclick="toggleControls()" aria-label="Toggle controls">Controls</button>

        <div class="icon-buttons">
          <button class="control-btn icon-btn" id="playPauseBtn" onclick="toggleAnimation()" aria-label="Play/Pause" title="Pause">
            <span class="icon">⏸</span>
          </button>
          <button class="control-btn icon-btn" onclick="resetCamera()" aria-label="Reset view" title="Reset View">
            <span class="icon">↻</span>
          </button>
          <button class="control-btn icon-btn" id="change-mode" onclick="toggleMode()" aria-lebel="Change Background" title="Change Background">
            <span class="icon">🌙</span>
          </button>
          <button
            class="control-btn icon-btn"
            id="auscultation-btn"
            onclick="toggleAuscultationPanel()"
            aria-label="Auscultation Points"
            title="Auscultation Points"
          >
            <span class="icon">Ao</span>
          </button>
        </div>

        <div class="control-group rhythm-control custom-dropdown-container">
          <label>Rhythm:</label>
          <div class="custom-select-wrapper" id="customRhythmSelectWrapper">
            <div class="custom-select-trigger" id="customRhythmTrigger">
              <span id="customRhythmSelected">Select Rhythm...</span>
              <svg
                class="custom-select-arrow"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
            </div>
            <div class="custom-select-options-container">
              <div class="custom-select-options" id="customRhythmOptions">
                <!-- Filter input added via script -->
              </div>
            </div>
          </div>
          <select id="rhythmSelect" style="display: none" onchange="switchHeartRhythm(this.value)"></select>
        </div>

        <div class="control-group slider-control">
          <label for="bpmSlider">BPM:</label>
          <input
            type="range"
            id="bpmSlider"
            min="30"
            max="180"
            step="5"
            value="60"
            oninput="
              setHeartBPM(parseInt(this.value));
              document.getElementById('bpmValue').textContent = this.value;
            "
          />
          <span id="bpmValue" class="slider-value">60</span>
        </div>

        <div class="control-group slider-control">
          <label for="volumeSlider">Volume:</label>
          <input
            type="range"
            id="volumeSlider"
            min="0"
            max="100"
            step="5"
            value="70"
            oninput="
              setHeartSoundVolume(this.value / 100);
              document.getElementById('volumeValue').textContent = this.value + '%';
            "
          />
          <span id="volumeValue" class="slider-value">70%</span>
        </div>
      </div>

      <!-- Auscultation Panel -->
      <div class="auscultation-panel" id="auscultationPanel">
        <div class="auscultation-header">
          <h3>Select Auscultation Point</h3>
          <button class="close-btn" onclick="toggleAuscultationPanel()" aria-label="Close">✕</button>
        </div>
        <div class="chest-container">
          <img src="assets/chest.png" alt="Chest diagram" class="chest-image" />
          <div class="auscultation-points">
            <button
              class="auscultation-point aortic active"
              onclick="selectAuscultationPoint('Aortic')"
              title="Aortic - 2nd ICS, Right Sternal Border"
              aria-label="Aortic point"
            >
              <span class="point-dot"></span>
            </button>
            <button
              class="auscultation-point pulmonic"
              onclick="selectAuscultationPoint('Pulmonic')"
              title="Pulmonic - 2nd ICS, Left Sternal Border"
              aria-label="Pulmonic point"
            >
              <span class="point-dot"></span>
            </button>
            <button
              class="auscultation-point tricuspid"
              onclick="selectAuscultationPoint('Tricuspid')"
              title="Tricuspid - 4th ICS, Left Sternal Border"
              aria-label="Tricuspid point"
            >
              <span class="point-dot"></span>
            </button>
            <button
              class="auscultation-point mitral"
              onclick="selectAuscultationPoint('Mitral')"
              title="Mitral (Apex) - 5th ICS, Midclavicular Line"
              aria-label="Mitral point"
            >
              <span class="point-dot"></span>
            </button>
          </div>
        </div>
        <div class="selected-point-info" id="selectedPointInfo">
          <p>Current: <strong id="currentPoint">Aortic</strong></p>
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
          "three/examples/jsm/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
      }
    </script>

    <!-- Main application (includes controls manager) -->
    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const nativeSelect = document.getElementById("rhythmSelect");
        const trigger = document.getElementById("customRhythmTrigger");
        const selectedText = document.getElementById("customRhythmSelected");
        const optionsContainer = document.getElementById("customRhythmOptions");
        const wrapper = document.getElementById("customRhythmSelectWrapper");

        // Toggle dropdown
        trigger.addEventListener("click", (e) => {
          e.stopPropagation();
          wrapper.classList.toggle("open");
          // reset filter when opening
          if (wrapper.classList.contains("open")) {
            const filter = optionsContainer.querySelector("#rhythmFilter");
            if (filter) {
              filter.value = "";
              optionsContainer.querySelectorAll(".custom-select-option").forEach((el) => (el.style.display = ""));
            }
          }
        });

        // Close when clicking outside of the wrapper
        document.addEventListener("click", (e) => {
          if (!wrapper.contains(e.target)) {
            wrapper.classList.remove("open");
          }
        });

        // Observer to populate options when native select is updated
        const observer = new MutationObserver(() => {
          // clear existing options and add filter input
          optionsContainer.innerHTML = "";

          // create filter field as first child
          const filterInput = document.createElement("input");
          filterInput.type = "text";
          filterInput.id = "rhythmFilter";
          filterInput.placeholder = "Filter...";
          filterInput.style.marginBottom = "10px";
          filterInput.addEventListener("input", () => {
            const text = filterInput.value.toLowerCase();
            optionsContainer.querySelectorAll(".custom-select-option").forEach((el) => {
              const label = el.dataset.label || el.textContent;
              el.style.display = label.toLowerCase().includes(text) ? "" : "none";
            });
          });
          optionsContainer.appendChild(filterInput);

          Array.from(nativeSelect.options).forEach((opt, index) => {
            const optionDiv = document.createElement("div");
            optionDiv.className = "custom-select-option";
            optionDiv.dataset.value = opt.value;
            optionDiv.dataset.label = opt.textContent;

            // Build label span
            const labelSpan = document.createElement("span");
            labelSpan.textContent = opt.textContent;
            optionDiv.appendChild(labelSpan);

            // Inject "New" badge if the option has data-is-new
            if (opt.dataset.isNew === "true") {
              const badge = document.createElement("span");
              badge.className = "badge-new";
              badge.textContent = "New";
              optionDiv.appendChild(badge);
            }

            // Set initial selected
            if (opt.selected || index === 0) {
              if (index === 0 && !nativeSelect.value) {
                nativeSelect.value = opt.value;
              }
              selectedText.textContent = opt.textContent;
              optionDiv.classList.add("selected");
            }

            optionDiv.addEventListener("click", (e) => {
              e.stopPropagation();
              // Remove selected class from all options
              document.querySelectorAll(".custom-select-option").forEach((el) => el.classList.remove("selected"));
              optionDiv.classList.add("selected");

              nativeSelect.value = opt.value;
              selectedText.textContent = opt.textContent;
              wrapper.classList.remove("open");

              if (typeof window.switchHeartRhythm === "function") {
                window.switchHeartRhythm(opt.value);
              }
            });
            optionsContainer.appendChild(optionDiv);
          });
        });

        // Observe native select for child node modifications (options added)
        if (nativeSelect) {
          observer.observe(nativeSelect, { childList: true });
        }
      });
    </script>
  </body>
</html>
