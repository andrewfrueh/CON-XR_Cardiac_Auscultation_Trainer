<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Heart Visualization</title>

    <!-- External Stylesheets -->
    <link rel="stylesheet" href="assets/styles/main.css" />
    <link rel="stylesheet" href="assets/styles/controls.css" />

    <link rel="icon" type="image/png" href="/assets/favicon.png" />
  </head>
  <body>
    <div id="app-layout">
      <div id="container">
        <div id="loading">
          <div class="loading-spinner"></div>
          Loading Realistic Heart Model...
        </div>
        <div id="ekg-container">
          <div id="ekg-frame">
            <div id="ekg-header">
              <span id="ekg-label">❤ EKG</span>
              <button id="ekg-toggle" aria-label="Toggle EKG" title="Collapse EKG" onclick="toggleEKG()">
                <svg id="ekg-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
              </button>
            </div>
            <div id="ekg-canvas-wrap">
              <canvas id="ekgCanvas"></canvas>
            </div>
            <div id="ekg-resize-handle" aria-hidden="true"></div>
          </div>
        </div>

        <!--Add auscultation points to the 3D chest-->
        <div id="aortic-but" class="auscultation-btn">
          <button
            class="auscultation-point aortic active"
            onclick="selectAuscultationPoint('Aortic')"
            title="Aortic - 2nd ICS, Right Sternal Border"
            aria-label="Aortic point"
          >
            <span class="point-dot"></span>
          </button>
        </div>
        <!--end aortic-but-->
        <div id="pulmonic-but" class="auscultation-btn">
          <button
            class="auscultation-point pulmonic"
            onclick="selectAuscultationPoint('Pulmonic')"
            title="Pulmonic - 2nd ICS, Left Sternal Border"
            aria-label="Pulmonic point"
          >
            <span class="point-dot"></span>
          </button>
        </div>
        <!--end pulmonic-but-->
        <div id="tricuspid-but" class="auscultation-btn">
          <button
            class="auscultation-point tricuspid"
            onclick="selectAuscultationPoint('Tricuspid')"
            title="Tricuspid - 4th ICS, Left Sternal Border"
            aria-label="Tricuspid point"
          >
            <span class="point-dot"></span>
          </button>
        </div>
        <!--end trrcuspid-but-->
        <div id="mitral-but" class="auscultation-btn">
          <button
            class="auscultation-point mitral"
            onclick="selectAuscultationPoint('Mitral')"
            title="Mitral (Apex) - 5th ICS, Midclavicular Line"
            aria-label="Mitral point"
          >
            <span class="point-dot"></span>
          </button>
        </div>
        <!--end mitral-but-->
      </div>

      <div class="controls" id="heartControls">
        <!-- Play button that shows when controls are collapsed (mobile only) -->
        <button class="control-btn icon-btn play-btn-collapsed" id="playPauseBtnCollapsed" onclick="toggleAnimation()" aria-label="Play/Pause" title="Pause">
          <span class="icon">⏸</span>
        </button>

        <button class="control-btn toggle-btn" onclick="toggleControls()" aria-label="Toggle controls">Controls</button>

        <div class="icon-buttons">
          <button class="control-btn icon-btn" id="playPauseBtn" onclick="toggleAnimation()" aria-label="Play/Pause" title="Pause">
            <span class="icon">⏸</span>
          </button>
          <button class="control-btn icon-btn" onclick="resetCamera()" aria-label="Reset view" title="Reset View">
            <span class="icon">↻</span>
          </button>
          <button class="control-btn icon-btn" id="change-mode" onclick="toggleMode()" aria-lebel="Change Background" title="Change Background">
            <span class="icon">🌙</span>
          </button>
          <button class="control-btn icon-btn" id="toggle-view" onclick="toggleView()" aria-label="Toggle View" title="Toggle View">
            <span class="icon">❤️</span>
          </button>
        </div>

        <div class="control-group rhythm-control custom-dropdown-container">
          <label>Rhythm:</label>
          <div class="custom-select-wrapper" id="customRhythmSelectWrapper">
            <div class="custom-select-trigger" id="customRhythmTrigger">
              <span id="customRhythmSelected">Select Rhythm...</span>
              <svg
                class="custom-select-arrow"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
            </div>
            <div class="custom-select-options-container">
              <div class="custom-select-options" id="customRhythmOptions">
                <!-- Filter input added via script -->
              </div>
            </div>
          </div>
          <select id="rhythmSelect" style="display: none" onchange="switchHeartRhythm(this.value)"></select>
        </div>

        <div class="control-group slider-control">
          <label for="bpmSlider">BPM:</label>
          <input
            type="range"
            id="bpmSlider"
            min="30"
            max="220"
            step="5"
            value="60"
            oninput="
              setHeartBPM(parseInt(this.value));
              document.getElementById('bpmValue').textContent = this.value;
            "
          />
          <span id="bpmValue" class="slider-value">60</span>
        </div>

        <div class="control-group slider-control">
          <label for="volumeSlider">Volume:</label>
          <input
            type="range"
            id="volumeSlider"
            min="0"
            max="100"
            step="5"
            value="70"
            oninput="
              setHeartSoundVolume(this.value / 100);
              document.getElementById('volumeValue').textContent = this.value + '%';
            "
          />
          <span id="volumeValue" class="slider-value">70%</span>
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
          "three/examples/jsm/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
      }
    </script>

    <!-- Main application (includes controls manager) -->
    <script type="module" src="/src/main.js"></script>
    <script src="/assets/rhythm-dropdown.js" defer></script>
    <script>
      /* ── EKG collapse toggle ───────────────────────────────────────── */
      var _ekgSavedHeight = null; // stash user-resized height across fold cycles
      function toggleEKG() {
        const frame      = document.getElementById('ekg-frame');
        const btn        = document.getElementById('ekg-toggle');
        const canvasWrap = document.getElementById('ekg-canvas-wrap');
        const collapsing = !frame.classList.contains('ekg-collapsed');

        if (collapsing) {
          // Save any inline height set by the resize handle, then clear it
          // so the CSS rule  .ekg-collapsed #ekg-canvas-wrap { height:0 }  wins.
          _ekgSavedHeight = canvasWrap.style.height || null;
          canvasWrap.style.height = '';
        } else {
          // Expanding – restore the custom height if user previously resized
          if (_ekgSavedHeight) {
            canvasWrap.style.height = _ekgSavedHeight;
          }
        }

        frame.classList.toggle('ekg-collapsed');
        btn.title = collapsing ? 'Expand EKG' : 'Collapse EKG';
        btn.setAttribute('aria-label', collapsing ? 'Expand EKG' : 'Collapse EKG');
      }

      /* ── EKG resize handle ─────────────────────────────────────────── */
      (function () {
        const MIN_W  = 200;  // px
        const MAX_W  = 520;  // px
        const MIN_CH = 56;   // canvas-wrap min height, px
        const MAX_CH = 240;  // canvas-wrap max height, px

        const handle    = document.getElementById('ekg-resize-handle');
        const container = document.getElementById('ekg-container');
        const canvasWrap = document.getElementById('ekg-canvas-wrap');

        let dragging = false;
        let startX, startY, startW, startH;

        function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

        handle.addEventListener('pointerdown', function (e) {
          e.preventDefault();
          dragging = true;
          startX = e.clientX;
          startY = e.clientY;
          startW = container.offsetWidth;
          startH = canvasWrap.offsetHeight;
          handle.setPointerCapture(e.pointerId);
          document.body.style.cursor = 'nwse-resize';
          document.body.style.userSelect = 'none';
        });

        handle.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          const newW = clamp(startW + (e.clientX - startX), MIN_W, MAX_W);
          const newH = clamp(startH + (e.clientY - startY), MIN_CH, MAX_CH);
          container.style.width = newW + 'px';
          canvasWrap.style.height = newH + 'px';
        });

        handle.addEventListener('pointerup', function (e) {
          dragging = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        });
      })();
    </script>

  </body>
</html>
